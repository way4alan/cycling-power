<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PACE戰力分析</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="loading" class="loading-screen">
  <div class="loading-icon">🚴</div>
  <div class="loading-text">載入中...</div>
</div>

<div id="pending-screen" style="display:none">
  <div class="pending-wrap"></div>
</div>

<div id="app" style="display:none">
  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="switchTab('leaderboard')">
      <span class="nav-icon">🏆</span>
      <span class="nav-label">排行榜</span>
    </button>
    <button class="nav-btn" onclick="switchTab('match')">
      <span class="nav-icon">⚡</span>
      <span class="nav-label">配對</span>
    </button>
    <button class="nav-btn pace-nav" onclick="switchTab('pace')">
      <span class="nav-icon">🚴</span>
      <span class="nav-label">PACE</span>
    </button>
    <button class="nav-btn" onclick="switchTab('ride')">
      <span class="nav-icon">📍</span>
      <span class="nav-label">團騎</span>
    </button>
    <button class="nav-btn" onclick="switchTab('profile')">
      <span class="nav-icon">👤</span>
      <span class="nav-label">我的資料</span>
    </button>
    <button class="nav-btn" id="admin-nav-btn" onclick="switchTab('admin')" style="display:none">
      <span class="nav-icon">🛡️</span>
      <span class="nav-label">管理</span>
    </button>
  </nav>

  <div class="content">
    <div id="tab-leaderboard" class="tab-panel active">
      <div class="page-header">
        <h1>PACE戰力排行榜</h1>
        <div class="cat-filters">
          <button class="cat-btn active" onclick="filterCat('all',this)">全部</button>
          <button class="cat-btn" onclick="filterCat('A',this)">A貓</button>
          <button class="cat-btn" onclick="filterCat('B',this)">B貓</button>
          <button class="cat-btn" onclick="filterCat('C',this)">C貓</button>
        </div>
      </div>
      <div class="metric-row">
        <div class="metric-card">
          <div class="metric-val" id="avg-ftp">—</div>
          <div class="metric-lbl">平均 FTP</div>
        </div>
        <div class="metric-card">
          <div class="metric-val" id="avg-wkg">—</div>
          <div class="metric-lbl">平均 W/kg</div>
        </div>
        <div class="metric-card">
          <div class="metric-val" id="member-count">—</div>
          <div class="metric-lbl">成員數</div>
        </div>
      </div>
      <div id="rider-list" class="rider-list"></div>
    </div>

    <div id="tab-match" class="tab-panel">
      <div class="page-header"><h1>配對對手</h1></div>
      <div class="match-me-card" id="match-me-card"></div>
      <h2 class="section-title">最接近你的對手</h2>
      <div id="match-list"></div>
    </div>

    <div id="tab-pace" class="tab-panel">
      <div class="page-header"><h1>PACE</h1></div>

      <div class="pace-section">
        <div class="pace-section-title">🔧 胎壓建議</div>
        <div id="tire-pressure-display">
          <div class="tire-setup-hint">請至「我的資料」填寫體重和胎寬</div>
        </div>
      </div>

      <div class="pace-section">
        <div class="pace-section-title">📋 團規與技巧</div>
        <div id="guidelines-list"></div>
      </div>
    </div>

    <div id="tab-ride" class="tab-panel">
      <div class="page-header">
        <h1>團騎公告</h1>
        <button class="icon-btn" id="add-ride-btn" style="display:none" onclick="showRideForm()">＋ 新增</button>
      </div>
      <div id="ride-form" style="display:none" class="form-card">
        <div class="form-row">
          <label>活動標題</label>
          <input type="text" id="ride-title" placeholder="例如：週日晨騎">
        </div>
        <div class="form-grid">
          <div class="form-row">
            <label>日期</label>
            <input type="date" id="ride-date">
          </div>
          <div class="form-row">
            <label>集合時間</label>
            <input type="time" id="ride-time">
          </div>
        </div>
        <div class="form-row">
          <label>第一集合點</label>
          <select id="ride-location1" onchange="handleLocationChange('1')">
            <option value="">載入中...</option>
          </select>
          <input type="text" id="ride-location1-custom" placeholder="輸入地址" style="display:none;margin-top:8px">
        </div>
        <div class="form-row">
          <label>第二集合點（選填）</label>
          <select id="ride-location2" onchange="handleLocationChange('2')">
            <option value="">不設第二集合點</option>
          </select>
          <input type="text" id="ride-location2-custom" placeholder="輸入地址" style="display:none;margin-top:8px">
        </div>
        <div class="form-row">
          <label>Strava 路線連結（選填）</label>
          <input type="text" id="ride-strava" placeholder="https://www.strava.com/routes/...">
        </div>
        <div class="form-row">
          <label>Garmin 路線連結（選填）</label>
          <input type="text" id="ride-garmin-url" placeholder="https://connect.garmin.com/...">
        </div>
        <div class="form-row">
          <label>Garmin Code（選填）</label>
          <input type="text" id="ride-garmin" placeholder="例如：AB1234">
        </div>
        <div class="form-row">
          <label>備註（選填）</label>
          <input type="text" id="ride-note" placeholder="例如：記得帶補給">
        </div>
        <div style="display:flex;gap:8px">
          <button class="save-btn" onclick="saveRide()">發布公告</button>
          <button class="cancel-btn" onclick="hideRideForm()">取消</button>
        </div>
      </div>
      <div id="ride-list"></div>
    </div>

    <div id="tab-profile" class="tab-panel">
      <div class="page-header"><h1>我的資料</h1></div>
      <div class="profile-avatar-row" id="profile-avatar-row"></div>
      <div class="form-card">
        <div class="form-row">
          <label>FTP（瓦特）</label>
          <input type="number" id="inp-ftp" placeholder="例如 280" oninput="updatePreview()">
        </div>
        <div class="form-row">
          <label>體重（kg）</label>
          <input type="number" id="inp-weight" placeholder="例如 70" oninput="updatePreview()">
        </div>
        <div class="wkg-preview" id="wkg-preview" style="display:none">
          <span id="preview-val">—</span> W/kg
          <span class="cat-badge" id="preview-cat"></span>
        </div>
        <div class="form-row">
          <label>胎寬</label>
          <select id="inp-tire">
            <option value="">請選擇胎寬</option>
            <option value="25">25c</option>
            <option value="26">26c</option>
            <option value="28">28c</option>
            <option value="29">29c</option>
            <option value="30">30c</option>
            <option value="32">32c</option>
          </select>
        </div>
        <div class="form-row">
          <label>心情小語（顯示在排行榜）</label>
          <input type="text" id="inp-mood" placeholder="例如：今天腿很酸 😅" maxlength="30">
        </div>
        <div class="zone-section">
          <div class="zone-title">訓練區間功率（選填）</div>
          <div class="zone-grid">
            <div class="zone-cell z1"><div class="zone-label">Z1 恢復</div><input type="number" id="z1" placeholder="W"></div>
            <div class="zone-cell z2"><div class="zone-label">Z2 耐力</div><input type="number" id="z2" placeholder="W"></div>
            <div class="zone-cell z3"><div class="zone-label">Z3 節奏</div><input type="number" id="z3" placeholder="W"></div>
            <div class="zone-cell z4"><div class="zone-label">Z4 閾值</div><input type="number" id="z4" placeholder="W"></div>
            <div class="zone-cell z5"><div class="zone-label">Z5 VO2</div><input type="number" id="z5" placeholder="W"></div>
          </div>
        </div>
        <button class="save-btn" onclick="saveProfile()">💾 儲存更新</button>
      </div>
    </div>

    <div id="tab-admin" class="tab-panel">
      <div class="page-header"><h1>成員管理</h1></div>
      <div class="admin-tabs">
        <button class="admin-tab active" onclick="switchAdminTab('pending')">待審核 <span id="pending-count" class="count-badge"></span></button>
        <button class="admin-tab" onclick="switchAdminTab('active')">已核准</button>
        <button class="admin-tab" onclick="switchAdminTab('locations')">集合地點</button>
        <button class="admin-tab" onclick="switchAdminTab('guidelines')">團規管理</button>
      </div>
      <div id="admin-pending" class="admin-panel active"></div>
      <div id="admin-active" class="admin-panel"></div>
      <div id="admin-locations" class="admin-panel">
        <div class="form-card" style="margin-bottom:12px">
          <div class="form-row">
            <label>地點名稱</label>
            <input type="text" id="loc-name" placeholder="例如：愛河之心">
          </div>
          <div class="form-row">
            <label>地址</label>
            <input type="text" id="loc-address" placeholder="例如：高雄市苓雅區四維三路2號">
          </div>
          <button class="save-btn" onclick="saveLocation()">新增地點</button>
        </div>
        <div id="location-list"></div>
      </div>
      <div id="admin-guidelines" class="admin-panel">
        <div class="form-card" style="margin-bottom:12px">
          <div class="form-row">
            <label>分類名稱</label>
            <input type="text" id="gl-category" placeholder="例如：🏔️ 爬坡技巧">
          </div>
          <div class="form-row">
            <label>內容</label>
            <textarea id="gl-content" placeholder="輸入內容..." rows="5" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:10px;font-size:14px;background:#fafafa;resize:vertical"></textarea>
          </div>
          <button class="save-btn" onclick="saveGuideline()">新增分類</button>
        </div>
        <div id="guideline-admin-list"></div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="app.js"></script>
</body>
</html>
