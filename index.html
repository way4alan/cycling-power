<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PACE戰力分析</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<link rel="stylesheet" href="style.css">

<body>
<div id="loading" class="loading-screen">
  <div class="loading-icon">🚴</div>
  <div class="loading-text">載入中...</div>
</div>

<div id="pending-screen" style="display:none">
  <div class="pending-wrap">
    <div class="pending-icon">⏳</div>
    <h2>申請審核中</h2>
    <p>你的加入申請已送出，請等待管理員審核。</p>
    <p class="pending-sub">審核通過後重新開啟 App 即可使用。</p>
  </div>
</div>

<div id="app" style="display:none">
  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="switchTab('leaderboard')">
      <span class="nav-icon">🏆</span>
      <span class="nav-label">排行榜</span>
    </button>
    <button class="nav-btn" onclick="switchTab('ride')">
      <span class="nav-icon">📍</span>
      <span class="nav-label">團騎</span>
    </button>
    <button class="nav-btn" onclick="switchTab('match')">
      <span class="nav-icon">⚡</span>
      <span class="nav-label">配對</span>
    </button>
    <button class="nav-btn" onclick="switchTab('profile')">
      <span class="nav-icon">👤</span>
      <span class="nav-label">我的資料</span>
    </button>
    <button class="nav-btn admin-only" id="admin-nav-btn" onclick="switchTab('admin')" style="display:none">
      <span class="nav-icon">🛡️</span>
      <span class="nav-label">管理</span>
    </button>
  </nav>

          <button class="cat-btn" onclick="filterCat('B',this)">B貓</button>
          <button class="cat-btn" onclick="filterCat('C',this)">C貓</button>
        </div>
      </div>

          <div class="metric-lbl">平均 FTP</div>
        </div>
        <div class="metric-card">
          <div class="metric-val" id="avg-wkg">—</div>
          <div class="metric-lbl">平均 W/kg</div>
        </div>
